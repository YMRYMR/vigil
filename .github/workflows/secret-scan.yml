name: Secret scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  scan:
    name: Scan for common plaintext secret patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check committed files for secret patterns
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          patterns = [
              ("AWS access key", re.compile(r"AKIA[0-9A-Z]{16}")),
              ("GitHub token", re.compile(r"gh[pousr]_[A-Za-z0-9_]{36,}")),
              ("Slack token", re.compile(r"xox[baprs]-[A-Za-z0-9-]{20,}")),
              ("Private key", re.compile(r"-----BEGIN (?:RSA |DSA |EC |OPENSSH |)PRIVATE KEY-----")),
              ("Generic secret assignment", re.compile(r"(?i)(?:api[_-]?key|secret|token|password)\s*[:=]\s*['\"][^'\"]{16,}['\"]")),
          ]
          allowed_paths = {
              Path('.github/workflows/secret-scan.yml'),
              Path('docs/OPENSSF-BEST-PRACTICES.md'),
          }
          tracked = subprocess.check_output(['git', 'ls-files'], text=True).splitlines()
          findings = []
          for name in tracked:
              path = Path(name)
              if path in allowed_paths:
                  continue
              try:
                  data = path.read_bytes()
              except OSError:
                  continue
              if b'\0' in data[:4096]:
                  continue
              text = data.decode('utf-8', errors='ignore')
              for label, regex in patterns:
                  if regex.search(text):
                      findings.append((label, name))
          if findings:
              print('Potential plaintext secrets found in tracked files:')
              for label, name in findings:
                  print(f' - {label}: {name}')
              raise SystemExit(1)
          PY
