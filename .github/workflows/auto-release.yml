name: Auto release after merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-release-master
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release tag from merged master
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Refresh master and tags
        run: git fetch origin master --tags

      - name: Skip stale CI runs
        id: freshness
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          current_master="$(git rev-parse origin/master)"
          if [ "$HEAD_SHA" != "$current_master" ]; then
            echo "release_ready=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=master advanced to $current_master" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "release_ready=true" >> "$GITHUB_OUTPUT"

      - name: Resolve merged pull request
        id: pr
        if: steps.freshness.outputs.release_ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_PULL_REQUESTS_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          set -euo pipefail

          is_json() {
            printf '%s' "$1" | jq -e . >/dev/null 2>&1
          }

          merged_master_pr() {
            jq -c '[.[] | select(.merged_at != null and .base.ref == "master")] | sort_by(.merged_at) | reverse | .[0] // empty'
          }

          candidate_numbers="$(printf '%s' "${WORKFLOW_PULL_REQUESTS_JSON:-[]}" | jq -r '.[].number? // empty' 2>/dev/null || true)"
          selected_pr=''

          for pr_number in $candidate_numbers; do
            pr_json="$(gh api -H "Accept: application/vnd.github+json" "/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" 2>/dev/null || true)"
            if [ -z "$pr_json" ] || ! is_json "$pr_json"; then
              continue
            fi
            if printf '%s' "$pr_json" | jq -e '.merged_at != null and .base.ref == "master"' >/dev/null 2>&1; then
              selected_pr="$pr_json"
              break
            fi
          done

          if [ -z "$selected_pr" ]; then
            prs_json="$(gh api -H "Accept: application/vnd.github+json" "/repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" 2>/dev/null || true)"
            if [ -n "$prs_json" ] && is_json "$prs_json"; then
              selected_pr="$(printf '%s' "$prs_json" | merged_master_pr)"
            fi
          fi

          if [ -z "$selected_pr" ]; then
            merge_message="$(git show -s --format=%B "$HEAD_SHA")"
            merge_pr_number="$(MERGE_MESSAGE="$merge_message" python3 - <<'PY'
          import re
          import os

          text = os.environ.get("MERGE_MESSAGE", "").splitlines()
          first = text[0] if text else ""
          match = re.match(r"Merge pull request #([0-9]+)", first)
          if match is None:
              match = re.search(r"\(#([0-9]+)\)$", first)
          print(match.group(1) if match else "")
          PY
            )"
            if [ -n "$merge_pr_number" ]; then
              pr_json="$(gh api -H "Accept: application/vnd.github+json" "/repos/${GITHUB_REPOSITORY}/pulls/${merge_pr_number}" 2>/dev/null || true)"
              if [ -n "$pr_json" ] && is_json "$pr_json" && printf '%s' "$pr_json" | jq -e '.merged_at != null and .base.ref == "master"' >/dev/null 2>&1; then
                selected_pr="$pr_json"
              fi
            fi
          fi

          pr_number="$(printf '%s' "$selected_pr" | jq -r '.number // empty' 2>/dev/null || true)"
          pr_head_ref="$(printf '%s' "$selected_pr" | jq -r '.head.ref // empty' 2>/dev/null || true)"
          if [ -z "$pr_number" ]; then
            echo "release_ready=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=no merged pull request found for ${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$pr_head_ref" == release/* ]]; then
            echo "release_ready=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=release bookkeeping branch ${pr_head_ref}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "release_ready=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Read current app version
        id: current
        if: steps.pr.outputs.release_ready == 'true'
        run: |
          python3 scripts/prepare_release.py \
            --cargo-toml Cargo.toml \
            --cargo-lock Cargo.lock \
            --print-current \
            --github-output "$GITHUB_OUTPUT"

      - name: Choose release version
        id: version
        if: steps.pr.outputs.release_ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
        run: |
          bump_patch() {
            VERSION="$1" PYTHONPATH="scripts${PYTHONPATH:+:$PYTHONPATH}" \
              python3 -c 'from prepare_release import bump_patch; import os; print(bump_patch(os.environ["VERSION"]))'
          }

          release_exists() {
            gh api "/repos/${GITHUB_REPOSITORY}/releases/tags/v$1" >/dev/null 2>&1
          }

          tag_snapshot_is_releasable() {
            VERSION="$1" PYTHONPATH="scripts${PYTHONPATH:+:$PYTHONPATH}" \
              python3 -c 'import os, subprocess, tomllib; version = os.environ["VERSION"]; cargo_toml = subprocess.run(["git", "show", f"refs/tags/v{version}:Cargo.toml"], check=True, capture_output=True, text=True).stdout; cargo_lock = subprocess.run(["git", "show", f"refs/tags/v{version}:Cargo.lock"], check=True, capture_output=True, text=True).stdout; toml_version = tomllib.loads(cargo_toml)["package"]["version"]; lock_packages = tomllib.loads(cargo_lock)["package"]; vigil = next((pkg for pkg in lock_packages if pkg.get("name") == "vigil"), None); raise SystemExit(0 if vigil and toml_version == version and vigil.get("version") == version else 1)'
          }

          tag_snapshot_matches_current_update_key() {
            VERSION="$1" python3 - <<'PY'
          import os
          import pathlib
          import re
          import subprocess

          version = os.environ["VERSION"]
          pattern = re.compile(r"UPDATE_PUBLIC_KEY_HEX:\s*&str\s*=\s*\"([0-9a-fA-F]+)\"")
          current_text = pathlib.Path("src/security/update.rs").read_text(encoding="utf-8")
          current_match = pattern.search(current_text)
          if current_match is None:
              raise SystemExit(1)
          tag_text = subprocess.run(
              ["git", "show", f"refs/tags/v{version}:src/security/update.rs"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout
          tag_match = pattern.search(tag_text)
          if tag_match is None:
              raise SystemExit(1)
          raise SystemExit(
              0
              if current_match.group(1).lower() == tag_match.group(1).lower()
              else 1
          )
          PY
          }

          candidate="$CURRENT_VERSION"
          advanced_past_current=false
          needs_commit=false
          needs_tag_push=false
          recovered_existing_tag=false

          while true; do
            if ! git rev-parse -q --verify "refs/tags/v${candidate}" >/dev/null; then
              needs_tag_push=true
              if [ "$advanced_past_current" = "true" ]; then
                needs_commit=true
              fi
              break
            fi

            if ! release_exists "$candidate"; then
              if tag_snapshot_is_releasable "$candidate" && tag_snapshot_matches_current_update_key "$candidate"; then
                recovered_existing_tag=true
                break
              fi
            fi

            candidate="$(bump_patch "$candidate")"
            advanced_past_current=true
          done

          echo "release_ready=true" >> "$GITHUB_OUTPUT"
          echo "next_version=$candidate" >> "$GITHUB_OUTPUT"
          echo "tag=v${candidate}" >> "$GITHUB_OUTPUT"
          echo "needs_commit=$needs_commit" >> "$GITHUB_OUTPUT"
          echo "needs_tag_push=$needs_tag_push" >> "$GITHUB_OUTPUT"
          echo "recovered_existing_tag=$recovered_existing_tag" >> "$GITHUB_OUTPUT"

      - name: Verify chosen release tag
        id: tag
        if: steps.version.outputs.release_ready == 'true'
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          NEEDS_TAG_PUSH: ${{ steps.version.outputs.needs_tag_push }}
        run: |
          if [ "$NEEDS_TAG_PUSH" = "true" ]; then
            if git rev-parse -q --verify "refs/tags/v${NEXT_VERSION}" >/dev/null; then
              echo "release_ready=false" >> "$GITHUB_OUTPUT"
              echo "skip_reason=tag v${NEXT_VERSION} already exists" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            if ! git rev-parse -q --verify "refs/tags/v${NEXT_VERSION}" >/dev/null; then
              echo "release_ready=false" >> "$GITHUB_OUTPUT"
              echo "skip_reason=tag v${NEXT_VERSION} is missing" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "release_ready=true" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update version files
        if: steps.tag.outputs.release_ready == 'true' && steps.version.outputs.needs_commit == 'true'
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          python3 scripts/prepare_release.py \
            --cargo-toml Cargo.toml \
            --cargo-lock Cargo.lock \
            --next-version "${NEXT_VERSION}"

      - name: Commit version bump
        if: steps.tag.outputs.release_ready == 'true' && steps.version.outputs.needs_commit == 'true'
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): cut v${NEXT_VERSION} after merge of #${PR_NUMBER} [skip ci]"

      - name: Prepare release source ref
        id: source
        if: steps.tag.outputs.release_ready == 'true'
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          if [ "${{ steps.version.outputs.needs_commit }}" = "true" ]; then
            echo "release_branch=release/v${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "source_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "source_ref=refs/tags/v${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag and push release ref
        if: steps.tag.outputs.release_ready == 'true'
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          NEEDS_COMMIT: ${{ steps.version.outputs.needs_commit }}
          NEEDS_TAG_PUSH: ${{ steps.version.outputs.needs_tag_push }}
          RELEASE_BRANCH: ${{ steps.source.outputs.release_branch }}
        run: |
          if [ "$NEEDS_TAG_PUSH" = "true" ]; then
            git tag -a "v${NEXT_VERSION}" -m "Vigil v${NEXT_VERSION}"
            if [ "$NEEDS_COMMIT" = "true" ]; then
              git push origin "HEAD:refs/heads/${RELEASE_BRANCH}" "refs/tags/v${NEXT_VERSION}"
            else
              git push origin "refs/tags/v${NEXT_VERSION}"
            fi
          else
            echo "Reusing existing tag v${NEXT_VERSION}."
            if [ "$NEEDS_COMMIT" = "true" ]; then
              git push origin "HEAD:refs/heads/${RELEASE_BRANCH}"
            fi
          fi

      - name: Open version bump pull request
        if: steps.tag.outputs.release_ready == 'true' && steps.version.outputs.needs_commit == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          RELEASE_BRANCH: ${{ steps.source.outputs.release_branch }}
        run: |
          existing_pr="$(gh pr list --base master --head "$RELEASE_BRANCH" --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            echo "Version bump PR already open: #$existing_pr"
            exit 0
          fi
          if ! gh pr create \
            --base master \
            --head "$RELEASE_BRANCH" \
            --title "chore(release): record v${NEXT_VERSION} version bump" \
            --body "Keeps \`Cargo.toml\` and \`Cargo.lock\` aligned with the already-cut \`v${NEXT_VERSION}\` release commit."; then
            echo "::warning::Could not open release bookkeeping PR for ${RELEASE_BRANCH}. The release branch was pushed successfully, but GitHub Actions is not allowed to create pull requests in this repository."
          fi

      - name: Report skipped release
        if: always() && steps.tag.outputs.release_ready != 'true'
        run: |
          echo "Auto-release skipped."
          echo "Freshness: ${{ steps.freshness.outputs.skip_reason }}"
          echo "PR resolution: ${{ steps.pr.outputs.skip_reason }}"
          echo "Versioning: ${{ steps.version.outputs.skip_reason }}"
          echo "Tag check: ${{ steps.tag.outputs.skip_reason }}"
