# This workflow lets you generate SLSA provenance file for your project.
# The generation satisfies level 3 for the provenance requirements - see https://slsa.dev/spec/v0.1/requirements
# The project is an initiative of the OpenSSF (openssf.org) and is developed at
# https://github.com/slsa-framework/slsa-github-generator.
# The provenance file can be verified using https://github.com/slsa-framework/slsa-verifier.
# For more information about SLSA and how it improves the supply-chain, visit slsa.dev.

name: SLSA generic generator
on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      # This creates a job-level output named 'digests' 
      # by pulling from the 'hash' step's internal 'hashes' variable.
      digests: ${{ steps.hash.outputs.hashes }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build artifacts
        run: |
            # Replace these with your actual build commands
            echo "binary-linux-amd64" > my-binary-1
            echo "binary-arm64" > my-binary-2

      - name: Generate subject for provenance
        id: hash
        run: |
          set -euo pipefail
          # Capture all your binaries
          files=$(ls my-binary-*)
          # Generate hashes and encode them for the SLSA generator
          echo "hashes=$(sha256sum $files | base64 -w0)" >> "${GITHUB_OUTPUT}"

  provenance:
    needs: [build]
    permissions:
      actions: read   # Required to detect the GitHub environment
      id-token: write # Required for non-forgeable signing via Sigstore
      contents: write # Required to attach provenance to your release
    # Reference the generator by a full version tag
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    with:
      base64-subjects: "${{ needs.build.outputs.digests }}"
      upload-assets: true
