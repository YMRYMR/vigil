name: Release

# Fires on every v* tag push (e.g. v1.0.0, v1.2.3-beta.1).
# Produces native double-click installers for each platform, then creates a
# GitHub Release with all artefacts attached.
#
# Artefacts per platform:
#   Windows  →  Vigil-Setup-<ver>-x86_64.exe   (Inno Setup wizard)
#   macOS    →  Vigil-<ver>-aarch64.dmg         (drag-to-Applications DMG)
#   Linux    →  Vigil-<ver>-x86_64.AppImage     (portable, double-click to run)
#   Bundle   →  Vigil-<ver>-all-supported-os.zip (all three installers together)
#
# Stable aliases are also published so the README can point directly to the
# latest assets without knowing the version string:
#   Vigil-latest-windows-x86_64.exe
#   Vigil-latest-macos-aarch64.dmg
#   Vigil-latest-linux-x86_64.AppImage
#   Vigil-latest-all-supported-os.zip
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.3.6
        required: true
        type: string
      version:
        description: Normalized release version, for example 1.3.6
        required: true
        type: string
      source_ref:
        description: Full git ref or 40-character commit SHA to check out for the release build; leave empty to build from the release tag
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  validate-release-metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      version: ${{ steps.validate.outputs.version }}
      checkout_ref: ${{ steps.validate.outputs.checkout_ref }}
    steps:
      - name: Validate release tag
        id: validate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            REF_NAME="$INPUT_TAG"
            VERSION="$INPUT_VERSION"
          else
            REF_NAME="$PUSH_REF_NAME"
            VERSION="${REF_NAME#v}"
          fi
          if [[ ! "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release tag: $REF_NAME" >&2
            echo "Expected vMAJOR.MINOR.PATCH with optional prerelease and/or build suffix." >&2
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid normalized version: $VERSION" >&2
            exit 1
          fi
          if [ "$REF_NAME" != "v$VERSION" ]; then
            echo "Input version $VERSION did not match tag $REF_NAME" >&2
            exit 1
          fi
          CHECKOUT_REF="$INPUT_SOURCE_REF"
          if [ -z "$CHECKOUT_REF" ]; then
            CHECKOUT_REF="refs/tags/$REF_NAME"
          elif [ "$CHECKOUT_REF" = "$REF_NAME" ]; then
            CHECKOUT_REF="refs/tags/$REF_NAME"
          elif [[ "$CHECKOUT_REF" =~ ^refs/(heads|tags)/[^[:space:]]+$ ]]; then
            :
          elif [[ "$CHECKOUT_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            :
          else
            echo "Invalid source_ref: $CHECKOUT_REF" >&2
            echo "Expected a full refs/heads/... or refs/tags/... value, the exact release tag, or a 40-character commit SHA." >&2
            exit 1
          fi
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"

  # ── Windows — Inno Setup EXE ───────────────────────────────────────────────
  build-windows:
    name: Build Windows installer
    needs: validate-release-metadata
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.validate-release-metadata.outputs.checkout_ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          key: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      # iscc (Inno Setup Compiler) is pre-installed on windows-latest.
      - name: Build Inno Setup installer
        shell: pwsh
        env:
          VIGIL_RELEASE_VERSION: ${{ needs.validate-release-metadata.outputs.version }}
        run: |
          $version = $env:VIGIL_RELEASE_VERSION
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$') {
            throw "Invalid release version: $version"
          }
          # Stage the binary next to the .iss file
          Copy-Item `
            target\x86_64-pc-windows-msvc\release\vigil.exe `
            installer\windows\vigil.exe
          # Compile
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=$version `
            installer\windows\setup.iss
          # Move output to a flat staging dir
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Move-Item installer\windows\output\*.exe dist\

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: installer-windows
          path: dist/

  # ── macOS — DMG with .app bundle ──────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    needs: validate-release-metadata
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.validate-release-metadata.outputs.checkout_ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          key: aarch64-apple-darwin

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build macOS DMG
        env:
          VERSION: ${{ needs.validate-release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi
          ICON_PNG="assets/vigil_icon.png"
          if [ ! -f "$ICON_PNG" ]; then
            ICON_PNG="assets/vigil.png"
          fi

          # ── .app bundle structure ──────────────────────────────────────────
          APP="Vigil.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp target/aarch64-apple-darwin/release/vigil "$APP/Contents/MacOS/vigil"
          chmod +x "$APP/Contents/MacOS/vigil"

          # Info.plist — substitute the version placeholder
          sed "s/VIGIL_VERSION/$VERSION/g" installer/macos/Info.plist \
            > "$APP/Contents/Info.plist"

          # Convert PNG icon → ICNS (sips is built into macOS)
          sips -s format icns "$ICON_PNG" \
            --out "$APP/Contents/Resources/vigil.icns" \
            2>/dev/null || true   # non-fatal if sips doesn't support this format

          # ── DMG ───────────────────────────────────────────────────────────
          # Create a temp folder with the app + Applications symlink (standard layout)
          DMG_STAGING="dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -r "$APP" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          mkdir -p dist
          hdiutil create \
            -volname "Vigil $VERSION" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "dist/Vigil-${VERSION}-aarch64.dmg"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: installer-macos
          path: dist/

  # ── Linux — AppImage ──────────────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    needs: validate-release-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.validate-release-metadata.outputs.checkout_ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          key: x86_64-unknown-linux-gnu

      # egui/eframe on Linux needs these at link time.
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build Linux AppImage
        env:
          VERSION: ${{ needs.validate-release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi
          ICON_PNG="assets/vigil_icon.png"
          if [ ! -f "$ICON_PNG" ]; then
            ICON_PNG="assets/vigil.png"
          fi

          # ── AppDir structure ───────────────────────────────────────────────
          APPDIR="Vigil.AppDir"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp target/x86_64-unknown-linux-gnu/release/vigil "$APPDIR/usr/bin/vigil"
          chmod +x "$APPDIR/usr/bin/vigil"

          # Icon — at AppDir root (required by AppImage spec) and in share/icons
          cp "$ICON_PNG" "$APPDIR/vigil.png"
          cp "$ICON_PNG" \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps/vigil.png"

          # Desktop entry and AppRun launcher
          cp installer/linux/vigil.desktop "$APPDIR/vigil.desktop"
          cp installer/linux/AppRun        "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          # ── appimagetool ──────────────────────────────────────────────────
          curl -fsSL \
            "https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage" \
            -o appimagetool
          echo "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0  appimagetool" | sha256sum -c -
          chmod +x appimagetool
          # AppImage tools need FUSE; use extract-and-run as a workaround on CI.
          ./appimagetool --appimage-extract
          mkdir -p dist
          ARCH=x86_64 ./squashfs-root/AppRun \
            "$APPDIR" \
            "dist/Vigil-${VERSION}-x86_64.AppImage"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: installer-linux
          path: dist/

  # ── Publish GitHub Release ────────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [validate-release-metadata, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.validate-release-metadata.outputs.checkout_ref }}

      - name: Collect all installers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: installer-*
          path: dist/
          merge-multiple: true

      - name: Build all-platforms bundle and stable aliases
        env:
          VERSION: ${{ needs.validate-release-metadata.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          zip -j "dist/Vigil-${VERSION}-all-supported-os.zip" \
            dist/*.exe dist/*.dmg dist/*.AppImage

          cp dist/Vigil-Setup-${VERSION}-x86_64.exe dist/Vigil-latest-windows-x86_64.exe
          cp dist/Vigil-${VERSION}-aarch64.dmg dist/Vigil-latest-macos-aarch64.dmg
          cp dist/Vigil-${VERSION}-x86_64.AppImage dist/Vigil-latest-linux-x86_64.AppImage
          cp dist/Vigil-${VERSION}-all-supported-os.zip dist/Vigil-latest-all-supported-os.zip

      - name: Generate signed update manifest
        env:
          VIGIL_UPDATE_SIGNING_KEY: ${{ secrets.VIGIL_UPDATE_SIGNING_KEY }}
          VERSION: ${{ needs.validate-release-metadata.outputs.version }}
          TAG: ${{ needs.validate-release-metadata.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${VIGIL_UPDATE_SIGNING_KEY:-}" ]; then
            echo "VIGIL_UPDATE_SIGNING_KEY is not configured; release signing is required."
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          KEY_FILE="$(mktemp)"
          SIG_RAW="$(mktemp)"
          MANIFEST="dist/Vigil-${VERSION}-update-manifest.json"
          SIGNATURE="dist/Vigil-${VERSION}-update-manifest.json.sig"
          trap 'rm -f "$KEY_FILE" "$SIG_RAW"' EXIT

          python3 - "$KEY_FILE" <<'PY'
          import base64
          import binascii
          import os
          import pathlib
          import sys

          PKCS8_ED25519_DER_PREFIX = bytes.fromhex("302e020100300506032b657004220420")
          PKCS8_ED25519_DER_LEN = len(PKCS8_ED25519_DER_PREFIX) + 32
          ED25519_PRIVATE_KEY_LEN = 64

          def private_key_marker(kind: str) -> str:
              return f"-----{kind} {'PRIVATE' + ' KEY'}-----"

          def chunked_base64(data: bytes, width: int = 64) -> str:
              encoded = base64.b64encode(data).decode("ascii")
              return "\n".join(
                  encoded[idx : idx + width] for idx in range(0, len(encoded), width)
              )

          def pem_from_pkcs8_der(der: bytes) -> str:
              return (
                  f"{private_key_marker('BEGIN')}\n"
                  f"{chunked_base64(der)}\n"
                  f"{private_key_marker('END')}\n"
              )

          def pkcs8_der_from_seed(seed: bytes) -> bytes:
              if len(seed) != 32:
                  raise ValueError(
                      f"expected a 32-byte Ed25519 seed, got {len(seed)} bytes instead"
                  )
              return PKCS8_ED25519_DER_PREFIX + seed

          def pkcs8_der_from_raw_private_key(private_key: bytes) -> bytes:
              if len(private_key) != ED25519_PRIVATE_KEY_LEN:
                  raise ValueError(
                      "expected a 64-byte Ed25519 private key, "
                      f"got {len(private_key)} bytes instead"
                  )
              return pkcs8_der_from_seed(private_key[:32])

          def looks_like_pem(text: str) -> bool:
              return "-----BEGIN " in text and ("PRIVATE" + " KEY-----") in text

          def normalize_pem(text: str) -> str:
              normalized = text.replace("\r\n", "\n").strip()
              if f"BEGIN OPENSSH {'PRIVATE' + ' KEY'}" in normalized:
                  from cryptography.hazmat.primitives import serialization

                  key = serialization.load_ssh_private_key(
                      normalized.encode("utf-8"), password=None
                  )
                  return key.private_bytes(
                      encoding=serialization.Encoding.PEM,
                      format=serialization.PrivateFormat.PKCS8,
                      encryption_algorithm=serialization.NoEncryption(),
                  ).decode("utf-8")
              if not looks_like_pem(normalized):
                  raise ValueError("secret did not contain a supported PEM private key")
              return f"{normalized}\n"

          def decoded_base64(text: str) -> bytes | None:
              compact = "".join(text.split())
              if not compact:
                  return None
              padding = "=" * (-len(compact) % 4)
              try:
                  return base64.b64decode(compact + padding, validate=True)
              except (binascii.Error, ValueError):
                  return None

          def normalize_signing_key(secret: str) -> str:
              raw = secret.strip()
              if not raw:
                  raise ValueError("update-signing secret is empty")

              pem_candidates = []
              if "\\n" in raw or "\\r" in raw:
                  pem_candidates.append(raw.replace("\\r", "").replace("\\n", "\n"))
              pem_candidates.append(raw)
              for candidate in pem_candidates:
                  if looks_like_pem(candidate):
                      return normalize_pem(candidate)

              compact = "".join(raw.split())

              if len(compact) == 64:
                  try:
                      return pem_from_pkcs8_der(pkcs8_der_from_seed(bytes.fromhex(compact)))
                  except ValueError:
                      pass

              try:
                  raw_bytes = bytes.fromhex(compact)
              except ValueError:
                  raw_bytes = None
              if raw_bytes is not None:
                  if len(raw_bytes) == 32:
                      return pem_from_pkcs8_der(pkcs8_der_from_seed(raw_bytes))
                  if len(raw_bytes) == ED25519_PRIVATE_KEY_LEN:
                      return pem_from_pkcs8_der(pkcs8_der_from_raw_private_key(raw_bytes))
                  if (
                      len(raw_bytes) == PKCS8_ED25519_DER_LEN
                      and raw_bytes.startswith(PKCS8_ED25519_DER_PREFIX)
                  ):
                      return pem_from_pkcs8_der(raw_bytes)

              decoded = decoded_base64(raw)
              if decoded is not None:
                  try:
                      decoded_text = decoded.decode("utf-8")
                  except UnicodeDecodeError:
                      decoded_text = None
                  if decoded_text is not None and looks_like_pem(decoded_text):
                      return normalize_pem(decoded_text)
                  if len(decoded) == 32:
                      return pem_from_pkcs8_der(pkcs8_der_from_seed(decoded))
                  if len(decoded) == ED25519_PRIVATE_KEY_LEN:
                      return pem_from_pkcs8_der(pkcs8_der_from_raw_private_key(decoded))
                  if (
                      len(decoded) == PKCS8_ED25519_DER_LEN
                      and decoded.startswith(PKCS8_ED25519_DER_PREFIX)
                  ):
                      return pem_from_pkcs8_der(decoded)

              raise ValueError(
                  "unsupported update-signing secret format; use PKCS#8 PEM, escaped PEM, "
                  "OpenSSH private key PEM, hex/base64 PKCS#8 DER, a raw 32-byte Ed25519 seed, "
                  "or a raw 64-byte Ed25519 private key"
              )

          pem = normalize_signing_key(os.environ["VIGIL_UPDATE_SIGNING_KEY"])
          output = pathlib.Path(sys.argv[1])
          output.write_text(pem, encoding="utf-8")
          output.chmod(0o600)
          PY

          python3 - "$KEY_FILE" <<'PY'
          import pathlib
          import re
          import subprocess
          import sys

          key_file = pathlib.Path(sys.argv[1])
          update_rs = pathlib.Path("src/security/update.rs").read_text(encoding="utf-8")
          match = re.search(
              r'UPDATE_PUBLIC_KEY_HEX:\s*&str\s*=\s*"([0-9a-fA-F]+)"',
              update_rs,
          )
          if match is None:
              raise SystemExit("Could not find UPDATE_PUBLIC_KEY_HEX in src/security/update.rs")
          expected_public_key = match.group(1).lower()
          spki_der = subprocess.run(
              ["openssl", "pkey", "-in", str(key_file), "-pubout", "-outform", "DER"],
              check=True,
              capture_output=True,
          ).stdout
          if len(spki_der) < 32:
              raise SystemExit("Derived update public key was unexpectedly short")
          actual_public_key = spki_der[-32:].hex()
          if actual_public_key != expected_public_key:
            raise SystemExit(
                "Configured VIGIL_UPDATE_SIGNING_KEY does not match the "
                "embedded update trust anchor in src/security/update.rs"
            )
          PY

          export VERSION TAG
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          dist = Path("dist")
          excluded = {
              f"Vigil-{version}-update-manifest.json",
              f"Vigil-{version}-update-manifest.json.sig",
              "Vigil-latest-update-manifest.json",
              "Vigil-latest-update-manifest.json.sig",
          }
          assets = []
          for path in sorted(dist.iterdir()):
              if not path.is_file() or path.name in excluded:
                  continue
              assets.append(
                  {
                      "name": path.name,
                      "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                  }
              )

          manifest = {
              "schema_version": 1,
              "channel": "stable",
              "tag": tag,
              "version": version,
              "assets": assets,
          }
          (dist / f"Vigil-{version}-update-manifest.json").write_text(
              json.dumps(manifest, separators=(",", ":"), ensure_ascii=False),
              encoding="utf-8",
          )
          PY

          openssl pkeyutl -sign -rawin -inkey "$KEY_FILE" -in "$MANIFEST" -out "$SIG_RAW"
          base64 -w0 "$SIG_RAW" > "$SIGNATURE"
          cp "$MANIFEST" dist/Vigil-latest-update-manifest.json
          cp "$SIGNATURE" dist/Vigil-latest-update-manifest.json.sig

      - name: Hash release assets
        id: hash
        shell: bash
        run: echo "hashes=$(sha256sum dist/* | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ needs.validate-release-metadata.outputs.tag }}
          name: Vigil ${{ needs.validate-release-metadata.outputs.tag }}
          generate_release_notes: true
          files: dist/*

      - name: Generate artifact attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: dist/*

  slsa-provenance:
    name: Generate SLSA provenance
    needs: publish
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.publish.outputs.hashes }}
      upload-assets: true
      private-repository: true
