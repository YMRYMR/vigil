name: Temporary PR 115 review fixer

on:
  push:
    branches:
      - codex/phase16-live-nvd-sync-20260428100031

permissions:
  contents: read

jobs:
  fix-review:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: codex/phase16-live-nvd-sync-20260428100031
          fetch-depth: 20
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: rustfmt
      - name: Apply review fixes
        run: |
          python3 <<'PY'
          from pathlib import Path

          advisory_path = Path('src/advisory.rs')
          text = advisory_path.read_text()

          old_import = 'use std::collections::HashMap;\n'
          if old_import in text:
              text = text.replace(old_import, '', 1)

          old_match = 'pub fn run_sync_cli(force: bool) -> Result<SyncOutcome, String> {\\n    match sync_nvd(force)? {'
          new_match = 'pub fn run_sync_cli(force: bool) -> Result<SyncOutcome, String> {\\n    let outcome = sync_nvd(force)?;\\n    match outcome {'
          if old_match not in text:
              raise SystemExit('expected run_sync_cli match was not found in src/advisory.rs')
          text = text.replace(old_match, new_match, 1)

          old_return = '    Ok(())\\n}\\n\\npub fn import_nvd_snapshot'
          new_return = '    Ok(outcome)\\n}\\n\\npub fn import_nvd_snapshot'
          if old_return not in text:
              raise SystemExit('expected run_sync_cli return was not found in src/advisory.rs')
          text = text.replace(old_return, new_return, 1)

          old_hash = '    let combined_hash = sha256_hex(&page_hashes.join(":"));'
          new_hash = '    let combined_hash = sha256_hex(page_hashes.join(":").as_bytes());'
          if old_hash not in text:
              raise SystemExit('expected finalize_import_batch_metadata hash line was not found in src/advisory.rs')
          text = text.replace(old_hash, new_hash, 1)

          advisory_path.write_text(text)
          PY
      - name: Apply rustfmt
        run: cargo fmt
      - name: Remove temporary workflow
        run: rm -f .github/workflows/fix-pr115-review.yml
      - name: Commit review fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/advisory.rs .github/workflows/fix-pr115-review.yml
          if git diff --cached --quiet; then
            echo "No review changes needed"
            exit 0
          fi
          git commit -m "fix(advisory): clear remaining clippy blockers"
          git push origin HEAD:codex/phase16-live-nvd-sync-20260428100031
